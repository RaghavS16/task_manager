<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #7c6af7;
      --accent-soft: rgba(124,106,247,0.12);
      --accent-hover: #9585f9;
      --green: #4ade80;
      --green-soft: rgba(74,222,128,0.1);
      --red: #f87171;
      --red-soft: rgba(248,113,113,0.1);
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --text-dim: #55556a;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
      --radius: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(15,15,17,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo span { color: var(--accent); }
    #user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    #username-badge {
      font-family: var(--mono);
      font-size: 0.8rem;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      border: 1px solid rgba(124,106,247,0.2);
    }

    /* ── BUTTONS ── */
    button {
      font-family: var(--sans);
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 0.6rem 1.25rem;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
    .btn-danger {
      background: var(--red-soft);
      color: var(--red);
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: 1px solid rgba(248,113,113,0.2);
    }
    .btn-danger:hover { background: rgba(248,113,113,0.2); }
    .btn-success {
      background: var(--green-soft);
      color: var(--green);
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: 1px solid rgba(74,222,128,0.2);
    }
    .btn-success:hover { background: rgba(74,222,128,0.2); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── AUTH PAGE ── */
    #auth-page {
      display: none;
      justify-content: center;
      align-items: center;
      flex: 1;
      padding: 2rem;
    }
    #auth-page.active { display: flex; }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }
    .auth-card h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .auth-card p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .auth-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 4px;
    }
    .auth-tab {
      flex: 1;
      background: transparent;
      color: var(--text-muted);
      padding: 0.5rem;
      border-radius: 6px;
      font-weight: 500;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .auth-tab:hover:not(.active) { color: var(--text); }

    /* ── APP PAGE ── */
    #app-page {
      display: none;
      flex: 1;
      flex-direction: column;
    }
    #app-page.active { display: flex; }
    .app-body {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
      flex: 1;
    }

    /* ── TASK CREATE CARD ── */
    .create-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .create-card h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .create-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .create-row .form-group { flex: 1; margin: 0; }
    .create-expand { margin-top: 0.75rem; }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filters span {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 0.25rem;
    }
    .filter-btn {
      background: var(--surface2);
      color: var(--text-muted);
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    .filter-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(124,106,247,0.3);
    }
    .filter-btn:hover:not(.active) { color: var(--text); }

    /* ── TASK LIST ── */
    .task-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-card:hover { border-color: var(--text-dim); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .task-card.completed { opacity: 0.6; }
    .task-card.completed .task-title { text-decoration: line-through; color: var(--text-muted); }

    .task-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }
    .task-check:hover { border-color: var(--green); }
    .task-check.done {
      background: var(--green);
      border-color: var(--green);
    }
    .task-check.done::after {
      content: '';
      width: 10px;
      height: 6px;
      border-left: 2px solid #0f0f11;
      border-bottom: 2px solid #0f0f11;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    .task-content { flex: 1; min-width: 0; }
    .task-title {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 0.2rem;
      word-break: break-word;
    }
    .task-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      word-break: break-word;
    }
    .task-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .task-actions {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
      align-items: center;
    }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding-bottom: 2rem;
    }
    .page-btn {
      background: var(--surface2);
      color: var(--text-muted);
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--mono);
    }
    .page-btn.current { background: var(--accent-soft); color: var(--accent); border-color: rgba(124,106,247,0.3); }
    .page-btn:hover:not(.current):not(:disabled) { color: var(--text); }
    .page-info { font-size: 0.8rem; color: var(--text-dim); font-family: var(--mono); }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; }
    .loading { text-align: center; padding: 3rem; color: var(--text-dim); font-family: var(--mono); font-size: 0.85rem; }

    /* ── TOAST ── */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
    }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      animation: toastIn 0.2s ease;
      max-width: 300px;
    }
    .toast.success { border-color: rgba(74,222,128,0.3); color: var(--green); }
    .toast.error { border-color: rgba(248,113,113,0.3); color: var(--red); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ── ERROR ── */
    .error-msg {
      font-size: 0.82rem;
      color: var(--red);
      background: var(--red-soft);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: var(--radius);
      padding: 0.6rem 0.9rem;
      margin-top: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── STATS ── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      flex: 1;
    }
    .stat-val {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
    }
    .stat-val.accent { color: var(--accent); }
    .stat-val.green { color: var(--green); }
    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .app-body { padding: 1.25rem 1rem; }
      .create-row { flex-direction: column; }
      .stats-bar { gap: 0.5rem; }
      .stat-val { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">task<span>flow</span></div>
  <div id="user-info" style="display:none">
    <span id="username-badge"></span>
    <button class="btn-ghost" id="logout-btn" style="padding:0.35rem 0.75rem;font-size:0.8rem">logout</button>
  </div>
</header>

<!-- AUTH PAGE -->
<div id="auth-page" class="page">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Manage your tasks simply and efficiently.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" style="width:100%" id="login-btn" onclick="handleLogin()">Sign in</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">(min 6 chars)</span></label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" style="width:100%" id="register-btn" onclick="handleRegister()">Create account</button>
      <div class="error-msg" id="register-error"></div>
    </div>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page" class="page">
  <div class="app-body">

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val accent" id="stat-total">0</div>
        <div class="stat-label">Total tasks</div>
      </div>
      <div class="stat">
        <div class="stat-val green" id="stat-done">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
    </div>

    <!-- Create Task -->
    <div class="create-card">
      <h3>New task</h3>
      <div class="create-row">
        <div class="form-group">
          <input type="text" id="new-task-title" placeholder="What needs to be done?" maxlength="200"
            onkeydown="if(event.key==='Enter')handleCreateTask()"/>
        </div>
        <button class="btn-primary" onclick="handleCreateTask()" id="create-btn">Add</button>
      </div>
      <div class="create-expand">
        <textarea id="new-task-desc" placeholder="Description (optional)" style="height:64px"></textarea>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <span>Show:</span>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="false" onclick="setFilter('false')">Pending</button>
      <button class="filter-btn" data-filter="true" onclick="setFilter('true')">Completed</button>
    </div>

    <!-- Task List -->
    <div id="task-list" class="task-list"></div>

    <!-- Pagination -->
    <div id="pagination" class="pagination" style="display:none"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
  // ── CONFIG ──
  // When served from same origin (FastAPI), use relative URLs.
  // Override with window.API_URL for separate deployments.
  const API = window.API_URL || '';

  // ── STATE ──
  let token = localStorage.getItem('tf_token') || null;
  let currentUser = JSON.parse(localStorage.getItem('tf_user') || 'null');
  let currentPage = 1;
  let currentFilter = 'all';
  const PAGE_SIZE = 8;

  // ── INIT ──
  document.addEventListener('DOMContentLoaded', () => {
    if (token && currentUser) showApp();
    else showAuth();

    // Enter key support
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('reg-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });
  });

  // ── ROUTING ──
  function showAuth() {
    document.getElementById('auth-page').classList.add('active');
    document.getElementById('app-page').classList.remove('active');
    document.getElementById('user-info').style.display = 'none';
    switchTab('login');
  }

  function showApp() {
    document.getElementById('auth-page').classList.remove('active');
    document.getElementById('app-page').classList.add('active');
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('username-badge').textContent = currentUser?.username || 'user';
    document.getElementById('logout-btn').onclick = logout;
    loadTasks();
  }

  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
    document.getElementById('tab-register').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
    clearErrors();
  }

  function clearErrors() {
    ['login-error','register-error'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.textContent = ''; el.classList.remove('visible'); }
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.classList.add('visible'); }
  }

  // ── AUTH ──
  async function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) return showError('login-error', 'Please fill in all fields.');

    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const form = new URLSearchParams();
      form.append('username', username);
      form.append('password', password);

      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: form
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || 'Login failed');

      token = data.access_token;
      localStorage.setItem('tf_token', token);

      // Fetch user info from token payload
      const payload = JSON.parse(atob(token.split('.')[1]));
      currentUser = { id: payload.sub, username };
      localStorage.setItem('tf_user', JSON.stringify(currentUser));

      showApp();
      toast('Signed in successfully', 'success');
    } catch (e) {
      showError('login-error', e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  }

  async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!username || !email || !password)
      return showError('register-error', 'Please fill in all fields.');

    const btn = document.getElementById('register-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Registration failed');

      toast('Account created! Please sign in.', 'success');
      switchTab('login');
      document.getElementById('login-username').value = username;
    } catch (e) {
      showError('register-error', e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Create account';
    }
  }

  function logout() {
    token = null; currentUser = null;
    localStorage.removeItem('tf_token');
    localStorage.removeItem('tf_user');
    showAuth();
    toast('Logged out', 'success');
  }

  // ── API HELPERS ──
  async function apiFetch(path, opts = {}) {
    const res = await fetch(`${API}${path}`, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        ...(opts.headers || {})
      }
    });
    if (res.status === 401) { logout(); throw new Error('Session expired'); }
    return res;
  }

  // ── TASKS ──
  async function loadTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '<div class="loading">loading tasks…</div>';

    let url = `/tasks?page=${currentPage}&size=${PAGE_SIZE}`;
    if (currentFilter !== 'all') url += `&completed=${currentFilter}`;

    try {
      const res = await apiFetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);

      renderStats(data);
      renderTasks(data.items);
      renderPagination(data);
    } catch (e) {
      list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  async function loadAllStatsTotal() {
    // Load all-filter total for the stats bar
    try {
      const res = await apiFetch(`/tasks?page=1&size=1`);
      const all = await res.json();
      const res2 = await apiFetch(`/tasks?page=1&size=1&completed=true`);
      const done = await res2.json();
      document.getElementById('stat-total').textContent = all.total;
      document.getElementById('stat-done').textContent = done.total;
      document.getElementById('stat-pending').textContent = all.total - done.total;
    } catch(_) {}
  }

  function renderStats(data) {
    // Update stats from current view if no filter
    loadAllStatsTotal();
  }

  function renderTasks(tasks) {
    const list = document.getElementById('task-list');
    if (!tasks.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="icon">${currentFilter === 'true' ? '🎉' : '📋'}</div>
        <p>${currentFilter === 'true' ? 'No completed tasks yet.' : currentFilter === 'false' ? 'No pending tasks. All done!' : 'No tasks yet. Create your first one above.'}</p>
      </div>`;
      return;
    }
    list.innerHTML = tasks.map(task => `
      <div class="task-card ${task.completed ? 'completed' : ''}" id="task-${task.id}">
        <button class="task-check ${task.completed ? 'done' : ''}"
          onclick="toggleTask(${task.id}, ${task.completed})" title="${task.completed ? 'Mark pending' : 'Mark complete'}">
        </button>
        <div class="task-content">
          <div class="task-title">${escHtml(task.title)}</div>
          ${task.description ? `<div class="task-desc">${escHtml(task.description)}</div>` : ''}
          <div class="task-meta">${formatDate(task.created_at)}</div>
        </div>
        <div class="task-actions">
          <button class="btn-danger" onclick="deleteTask(${task.id})">delete</button>
        </div>
      </div>
    `).join('');
  }

  function renderPagination(data) {
    const pg = document.getElementById('pagination');
    if (data.pages <= 1) { pg.style.display = 'none'; return; }
    pg.style.display = 'flex';
    let html = '';
    if (data.page > 1) html += `<button class="page-btn" onclick="goPage(${data.page-1})">← prev</button>`;
    for (let i = 1; i <= data.pages; i++) {
      html += `<button class="page-btn ${i === data.page ? 'current' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    if (data.page < data.pages) html += `<button class="page-btn" onclick="goPage(${data.page+1})">next →</button>`;
    html += `<span class="page-info">${data.page}/${data.pages}</span>`;
    pg.innerHTML = html;
  }

  function goPage(p) { currentPage = p; loadTasks(); }

  function setFilter(f) {
    currentFilter = f;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    loadTasks();
  }

  async function handleCreateTask() {
    const title = document.getElementById('new-task-title').value.trim();
    const description = document.getElementById('new-task-desc').value.trim();
    if (!title) return toast('Task title is required', 'error');

    const btn = document.getElementById('create-btn');
    btn.disabled = true; btn.textContent = '…';

    try {
      const res = await apiFetch('/tasks', {
        method: 'POST',
        body: JSON.stringify({ title, description: description || null })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to create task');

      document.getElementById('new-task-title').value = '';
      document.getElementById('new-task-desc').value = '';
      currentPage = 1;
      if (currentFilter === 'true') setFilter('all'); else loadTasks();
      toast('Task created', 'success');
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Add';
    }
  }

  async function toggleTask(id, currentCompleted) {
    try {
      const res = await apiFetch(`/tasks/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ completed: !currentCompleted })
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.detail); }
      loadTasks();
      toast(!currentCompleted ? 'Task completed ✓' : 'Marked as pending', 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try {
      const res = await apiFetch(`/tasks/${id}`, { method: 'DELETE' });
      if (!res.ok && res.status !== 204) { const d = await res.json(); throw new Error(d.detail); }
      loadTasks();
      toast('Task deleted', 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // ── UTILS ──
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
</script>
</body>
</html>
